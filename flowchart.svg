<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Drop shadow for cards -->
      <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
      </filter>
      <!-- Arrow marker -->
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
      </marker>
    </defs>

    <!-- ── TRIGGER ─────────────────────────────── -->
    <rect x="340" y="20" width="320" height="64" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="500" y="52" text-anchor="middle" fill="#f9fafb" font-size="14" font-weight="700">⏰ GitHub Actions Cron</text>
    <text x="500" y="72" text-anchor="middle" fill="#9ca3af" font-size="12">0 1:30 UTC = 7:00 AM IST</text>

    <!-- ── FETCH ─────────────────────────────── -->
    <rect x="340" y="120" width="320" height="64" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="500" y="152" text-anchor="middle" fill="#f9fafb" font-size="14" font-weight="700">📡 fetch_and_send.py</text>
    <text x="500" y="172" text-anchor="middle" fill="#9ca3af" font-size="12">Load .env, read feeds.json</text>

    <!-- ── FEEDS ─────────────────────────────── -->
    <rect x="80" y="240" width="260" height="72" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13" font-weight="700">📰 RSS / Atom Feeds</text>
    <text x="210" y="286" text-anchor="middle" fill="#9ca3af" font-size="11">TechCrunch AI, Verge, Ars</text>
    <text x="210" y="302" text-anchor="middle" fill="#9ca3af" font-size="11">Anthropic, OpenAI, MIT, Reddit</text>

    <rect x="660" y="240" width="260" height="72" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="790" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13" font-weight="700">🔐 .env (Secrets)</text>
    <text x="790" y="286" text-anchor="middle" fill="#9ca3af" font-size="11">EMAIL_ADDRESS</text>
    <text x="790" y="302" text-anchor="middle" fill="#9ca3af" font-size="11">EMAIL_APP_PASSWORD</text>

    <!-- ── PARSE & FILTER ─────────────────────── -->
    <rect x="340" y="240" width="320" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="500" y="268" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="700">🔍 Parse & Filter</text>
    <text x="500" y="286" text-anchor="middle" fill="#9ca3af" font-size="11">Last 24h • Dedupe by title</text>
    <text x="500" y="302" text-anchor="middle" fill="#9ca3af" font-size="11">Relevance score (AI keywords)</text>

    <!-- ── FORMAT ─────────────────────────────── -->
    <rect x="340" y="360" width="320" height="64" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="500" y="392" text-anchor="middle" fill="#f9fafb" font-size="14" font-weight="700">🎨 Format Brief</text>
    <text x="500" y="412" text-anchor="middle" fill="#9ca3af" font-size="12">Dark-mode HTML • Bullet sections</text>

    <!-- ── EMAIL SECTIONS ─────────────────────── -->
    <rect x="60" y="480" width="200" height="56" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="160" y="504" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">🔥 Top Story</text>
    <text x="160" y="522" text-anchor="middle" fill="#9ca3af" font-size="11">GPT-5.6 headline + bullets</text>

    <rect x="280" y="480" width="200" height="56" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="380" y="504" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">🏆 LLM Leaderboard</text>
    <text x="380" y="522" text-anchor="middle" fill="#9ca3af" font-size="11">Rankings + pricing table</text>

    <rect x="500" y="480" width="200" height="56" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="600" y="504" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">🏢 Enterprise Agents</text>
    <text x="600" y="522" text-anchor="middle" fill="#9ca3af" font-size="11">New launches this week</text>

    <rect x="720" y="480" width="200" height="56" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="820" y="504" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">⚡ TL;DR for Devs</text>
    <text x="820" y="522" text-anchor="middle" fill="#9ca3af" font-size="11">6 key takeaways</text>

    <!-- ── SEND ─────────────────────────────── -->
    <rect x="340" y="590" width="320" height="64" rx="10" fill="#065f46" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="500" y="622" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">📧 Gmail SMTP Send</text>
    <text x="500" y="642" text-anchor="middle" fill="#9ca3af" font-size="12">smtp.gmail.com:587 • TLS</text>

    <!-- ── RECIPIENTS ────────────────────────── -->
    <rect x="340" y="690" width="320" height="52" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
    <text x="500" y="716" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">Send to 2 recipients</text>
    <text x="500" y="732" text-anchor="middle" fill="#9ca3af" font-size="11">syedkaifuddin4@gmail.com • rahmnatwork@gmail.com</text>

    <!-- ── CONNECTORS ────────────────────────── -->
    <!-- Trigger → Fetch -->
    <line x1="500" y1="84" x2="500" y2="120" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Fetch → Parse -->
    <line x1="500" y1="184" x2="500" y2="240" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Feeds → Parse -->
    <line x1="210" y1="276" x2="340" y2="276" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- Secrests → Parse -->
    <line x1="660" y1="276" x2="660" y2="276" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="780" y1="276" x2="660" y2="276" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Parse → Format -->
    <line x1="500" y1="312" x2="500" y2="360" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Format → Sections (4 arrows) -->
    <line x1="380" y1="392" x2="210" y2="480" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
    <line x1="460" y1="392" x2="380" y2="480" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
    <line x1="540" y1="392" x2="600" y2="480" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
    <line x1="620" y1="392" x2="820" y2="480" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

    <!-- Sections → Send -->
    <line x1="500" y1="536" x2="500" y2="590" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- Send → Recipients -->
    <line x1="500" y1="654" x2="500" y2="690" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow)"/>

    <!-- ── OUTPUT FILE SIDE BRANCH ────────────── -->
    <rect x="780" y="360" width="180" height="52" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="870" y="388" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="700">💾 JSON Output</text>
    <text x="870" y="404" text-anchor="middle" fill="#9ca3af" font-size="11">public/data/daily-brief.json</text>
    <line x1="660" y1="392" x2="780" y2="392" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

    <!-- ── LABELS ─────────────────────────────── -->
    <text x="500" y="754" text-anchor="middle" fill="#6b7280" font-size="11">© Daily AI Tech Brief • Gmail SMTP • GitHub Actions</text>
  </svg>